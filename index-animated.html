<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Living Globe — Animated</title>
<style>
  :root{--text:#e8edf5;--dim:#8b96ab;--accent:#5fd0ff;--panel:rgba(11,15,26,0.82);--line:rgba(255,255,255,0.12);}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#03040a;overflow:hidden;color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
  #scene{position:absolute;inset:0;}
  .title{position:absolute;top:20px;left:24px;z-index:5;font-size:15px;font-weight:700;letter-spacing:.04em;}
  .title span{display:block;font-size:11px;color:var(--dim);font-weight:400;margin-top:3px;letter-spacing:.02em;}
  .panel{position:absolute;top:20px;right:24px;z-index:5;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:12px;backdrop-filter:blur(10px);width:178px;}
  .panel h4{margin:0 0 9px;font-size:10px;letter-spacing:.16em;color:var(--dim);font-weight:600;}
  .tog{display:flex;align-items:center;gap:8px;width:100%;text-align:left;cursor:pointer;font-size:12px;
    padding:8px 10px;border-radius:8px;color:var(--dim);background:rgba(255,255,255,0.03);
    border:1px solid var(--line);margin-bottom:6px;transition:all .15s ease;}
  .tog:hover{color:var(--text);border-color:rgba(255,255,255,0.3);}
  .tog.on{color:#06121a;font-weight:600;background:var(--accent);border-color:var(--accent);}
  .row{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--dim);margin-top:10px;}
  .row input{width:96px;}
  .hud{position:absolute;left:0;right:0;bottom:0;z-index:5;height:28px;display:flex;align-items:center;gap:20px;
    padding:0 16px;background:linear-gradient(0deg,rgba(6,9,16,0.95),rgba(6,9,16,0.6));
    border-top:1px solid var(--line);font-family:'SF Mono',Consolas,monospace;font-size:10.5px;
    letter-spacing:.06em;color:var(--dim);}
  .hud b{color:var(--text);}
  .hud .right{margin-left:auto;}
  .loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:6;color:var(--dim);
    font-family:'SF Mono',Consolas,monospace;font-size:13px;letter-spacing:.08em;}
  .loading.hide{display:none;}
</style>
</head>
<body>
  <div id="scene"></div>

  <div class="title">◈ LIVING GLOBE <span>animated build · drag to orbit · scroll to zoom</span></div>

  <div class="panel">
    <h4>ANIMATION LAYERS</h4>
    <button class="tog on" data-fx="clouds">☁ Drifting clouds</button>
    <button class="tog on" data-fx="wind">💨 Wind streams</button>
    <button class="tog on" data-fx="atmos">✦ Atmosphere</button>
    <button class="tog on" data-fx="daynight">☀ Day / night cycle</button>
    <div class="row"><span>Time speed</span><input id="speed" type="range" min="0" max="100" value="30"></div>
  </div>

  <div class="loading" id="loading">initializing planet…</div>

  <div class="hud">
    <span>FPS <b id="fps">—</b></span>
    <span>PARTICLES <b id="pcount">0</b></span>
    <span>WIND GRID <b id="grid">…</b></span>
    <span>SUBSOLAR <b id="subsolar">—</b></span>
    <span class="right">raw three.js · real wind via open-meteo</span>
  </div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
    "astronomy-engine": "https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/esm/astronomy.js"
  }
}
</script>
<script type="module" src="animated.js"></script>
</body>
</html>
